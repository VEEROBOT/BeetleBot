# ============================================================
# AMCL — LOCALIZATION (NAV MODE)
# Estimates robot pose on a prebuilt map
# Publishes: map ? odom
# ============================================================
amcl:
  ros__parameters:
    use_sim_time: false            # Use simulation clock (Gazebo). false = real robot

    # ----------------------------
    # Coordinate frames
    # ----------------------------
    base_frame_id: base_footprint  # Robot base frame (2D, no roll/pitch)
    odom_frame_id: odom            # Continuous odometry frame
    global_frame_id: map           # Global map frame

    # ----------------------------
    # Topics
    # ----------------------------
    scan_topic: scan               # LaserScan topic used for localization

    # ----------------------------
    # Motion model
    # ----------------------------
    robot_model_type: differential # Differential-drive kinematics

    # ----------------------------
    # Particle filter settings
    # ----------------------------
    min_particles: 500             # Minimum number of particles
    max_particles: 2000            # Maximum number of particles
    resample_interval: 1           # Resample every N updates
    transform_tolerance: 0.2       # Allowed TF delay (seconds)

    # ----------------------------
    # Laser sensor model
    # ----------------------------
    laser_model_type: likelihood_field  # Preferred indoor laser model
    laser_max_range: 16.0               # Ignore readings beyond this range

    # Probability weights for laser model
    z_hit: 0.5                     # Correct measurement probability
    z_short: 0.05                  # Unexpected short reading
    z_max: 0.05                    # Max-range reading
    z_rand: 0.5                    # Random noise
    sigma_hit: 0.2                 # Std deviation of hit distribution

    # ----------------------------
    # Update thresholds
    # ----------------------------
    update_min_d: 0.15             # Min translation before update (meters)
    update_min_a: 0.15             # Min rotation before update (radians)

    # ----------------------------
    # Initial pose handling
    # ----------------------------
    set_initial_pose: false        # Require external/manual initial pose